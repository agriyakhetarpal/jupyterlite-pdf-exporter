name: Build

on:
  push:
    branches: main
  pull_request:
    branches: '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@f5d710df1483f19b666dd96aeabbe949a53642c2 # v1

      - name: Install dependencies
        run: python -m pip install -U "jupyterlab>=4.0.0,<5"

      - name: Lint the extension
        run: |
          set -eux
          jlpm
          jlpm run lint:check

      - name: Test the extension
        run: |
          set -eux
          jlpm run test

      - name: Build the extension
        run: |
          set -eux
          python -m pip install .[test]

          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "jupyterlite-pdf-exporter.*OK"

      - name: Package the extension
        run: |
          set -eux

          pip install build
          python -m build
          pip uninstall -y "jupyterlite-pdf-exporter" jupyterlab

      - name: Upload extension packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: extension-artifacts
          path: dist/jupyterlite_pdf_exporter*
          if-no-files-found: error

  test_isolated:
    name: Test extension in isolation
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'
          architecture: 'x64'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: extension-artifacts
      - name: Install and Test
        run: |
          set -eux
          # Remove Node.js, twice to take care of system and locally installed node versions.
          sudo rm -rf $(which node)
          sudo rm -rf $(which node)

          pip install "jupyterlab>=4.0.0,<5" jupyterlite_pdf_exporter*.whl


          jupyter labextension list
          jupyter labextension list 2>&1 | grep -ie "jupyterlite-pdf-exporter.*OK"
          python -m jupyterlab.browser_check --no-browser-test

  build_jupyterlite:
    name: Build JupyterLite distribution
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout

        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@f5d710df1483f19b666dd96aeabbe949a53642c2 # v1

      - name: Build wheel
        run: |
          set -eux
          pipx run build --wheel --outdir wheelhouse

      - name: Install JupyterLite and extension dependencies
        run: |
          set -eux
          pip install -r lite/requirements.txt
          pip install wheelhouse/*.whl

      - name: Build JupyterLite
        run: |
          set -eux
          jupyter lite build --lite-dir=lite --output-dir=dist

      - name: Upload JupyterLite distribution
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jupyterlite-distribution-${{ github.run_number }}
          path: dist/*

  publish_jupyterlite:
    name: Publish JupyterLite distribution to GitHub Pages
    needs: build_jupyterlite
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write # to publish to GitHub Pages
    steps:
      - name: Download JupyterLite distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: jupyterlite-distribution-${{ github.run_number }}
          path: dist
          merge-multiple: true

      - name: Publish JupyterLite distribution to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          commit_message: 'Publish JupyterLite distribution for commit ${{ github.event.head_commit.message }}'
          force_orphan: true

